<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just for fun, not real.</title>
    <style>
        :root {
            --gold: #ffcc00;
            --red: #ff4d6d;
            --dark: #0a0a1a;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle, #1a1a3a 0%, #050510 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        h1 { color: var(--gold); text-shadow: 0 0 10px rgba(255,204,0,0.5); margin-top: 30px; text-transform: uppercase; }

        .input-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        input {
            padding: 12px;
            width: 80%;
            border-radius: 8px;
            border: 2px solid var(--gold);
            background: #000;
            color: white;
            text-align: center;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        /* Lưới hiển thị quà - Chia làm 2 cột trên điện thoại, 3 cột trên máy tính */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 900px;
            width: 100%;
        }
        @media (min-width: 600px) {
            .grid { grid-template-columns: repeat(3, 1fr); }
        }

        .card {
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }
        .card:hover { transform: scale(1.03); border-color: var(--gold); }
        .card img { width: 100%; height: 120px; object-fit: cover; background: #222; }
        .card-info { padding: 12px; text-align: center; flex-grow: 1; }
        .card-info p { margin: 0 0 10px 0; font-weight: bold; font-size: 0.85rem; height: 34px; overflow: hidden; }
        
        .btn {
            background: linear-gradient(to right, #f12711, #f5af19);
            border: none;
            color: white;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        /* MODAL THÔNG BÁO */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-content {
            background: #1c1c2e;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--gold);
            text-align: center;
            max-width: 350px;
            width: 100%;
            animation: zoomIn 0.3s ease-out;
        }
        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .success-icon { font-size: 50px; color: #4cd137; margin-bottom: 15px; }
        .close-btn {
            margin-top: 20px;
            padding: 10px 30px;
            background: var(--gold);
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Just for fun, not real.</h1>

<div class="input-box">
    <p>Helo Just for fun, not real.</p>
    <input type="number" id="playerID" placeholder="NO NO...">
</div>

<div class="grid">
    <div class="card">
        <img src="https://i.postimg.cc/k5VKyp4m/Screenshot-2026-03-22-15-24-40-23.jpg" alt="Quà 1">
        <div class="card-info">
            <p>Mặt nạ xứ giả</p>
            <button class="btn" onclick="showSuccess('')">Yes</button>
        </div>
    </div>

    <div class="card">
        <img src="https://i.postimg.cc/0jhCY1Gq/Screenshot-2026-03-22-15-22-42-38.jpg" alt="Quà 2">
        <div class="card-info">
            <p>Áo thánh phồnh</p>
            <button class="btn" onclick="showSuccess('MP40 Mãng Xà')">yes</button>
        </div>
    </div>

    <div class="card">
        <img src="https://i.postimg.cc/j54V3vgM/Screenshot-2026-03-22-15-20-39-11.jpg" alt="Quà 3">
        <div class="card-info">
            <p>Trogon hoàng kim</p>
            <button class="btn" onclick="showSuccess('Nhân vật Alok')">yes</button>
        </div>
    </div>

    <div class="card">
        <img src="https://i.postimg.cc/zD4wP5WY/1D167776-B7C2-4353-B857-ECD76C4FE961.png" alt="Quà 4">
        <div class="card-info">
            <p>Scar cá mập đen</p>
            <button class="btn" onclick="showSuccess('Thẻ Vô Cực')">yes</button>
        </div>
    </div>

    <div class="card">
        <img src="https://i.postimg.cc/dtDR53D7/Screenshot-2026-03-22-15-10-42-02.jpg" alt="Quà 5">
        <div class="card-info">
            <p>M887 vũ trụ huỷ diệt </p>
            <button class="btn" onclick="showSuccess('Skin Nắm Đấm')">yes</button>
        </div>
    </div>

    <div class="card">
        <img src="https://i.postimg.cc/QtxhcRSV/Anh-skin-sung-free-fire-lv7-ngau.jpg" alt="Ak rồng xanh">
        <div class="card-info">
            <p>Hành Động Hiếm</p>
            <button class="btn" onclick="showSuccess('Hành Động Hiếm')">yes</button>
        </div>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal-content">
        <div class="success-icon">✔</div>
        <h2 style="color:var(--gold); font-size: 1.2rem;">THÀNH CÔNG!</h2>
        <p id="msg-detail" style="font-size: 0.9rem; line-height: 1.5;"></p>
        <button class="close-btn" onclick="closeModal()">ĐÓNG</button>
    </div>
</div>

<script>
    function showSuccess(itemName) {
        const id = document.getElementById('playerID').value;
        const modal = document.getElementById('modal-overlay');
        const detail = document.getElementById('msg-detail');

        if (id.length < 5) {
            alert("Vui lòng nhập ID game chính xác!");
            return;
        }

        detail.innerHTML = `Vật phẩm: <b>${itemName}</b><br>Đã được đăng ký cho name: <b>${id}</b>.<br><br> sẽ được duyệt và gửi sau 24h làm việc!`;
        modal.style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
    }
</script>

</body>
</html>
